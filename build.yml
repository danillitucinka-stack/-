name: Build EXE

on:
  push:
    branches: [ "main" ] # Сработает, когда ты зальешь код в ветку main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow pyautogui mss # Добавь сюда все свои библиотеки

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "WinSystemHost" server.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Remote-Server-EXE
        path: dist/WinSystemHost.exe
